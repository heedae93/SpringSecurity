server:
  port: 9090

spring:
  application:
    name: authtest

  # H2 인메모리 DB (연습용)
  datasource:
    url: jdbc:h2:mem:authtestdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console 로 DB 확인 가능

  sql:
    init:
      mode: always    # 서버 시작 시 schema.sql / data.sql 자동 실행

  security:
    filter:
      order: 10

jwt:
  secret:
    key: c3ByaW5nLWJvb3Qtc2VjdXJpdHktand0LXNlY3JldC10dWxpcC13ZWItdHVsaXAtMDAwMDAwMDAwMDAwMDAwMA==

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.authtest.dto
